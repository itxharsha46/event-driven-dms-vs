# ===============================
# 1. Server Configuration
# ===============================
server.port=8080
spring.application.name=dms-core-service

# 🚀 ALLOW LARGE FILE UPLOADS (Up to 50MB per file)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# 2. PostgreSQL (Event Store) Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5433/dms_event_store
spring.datasource.username=postgres
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 3. Apache Kafka (Event Bus) Configuration
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

# Producer properties (Sending events)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer properties (Listening to events)
spring.kafka.consumer.group-id=dms-core-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*